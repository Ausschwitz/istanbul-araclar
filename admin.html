<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>

  <style>
    :root{
      --bg:#f3f5f7;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#dfe3e8;
      --primary:#2563eb;
      --danger:#dc2626;
      --success:#16a34a;
      --secondary:#111827;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .hidden{ display:none !important; }

    .login-wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .login-box{
      width:100%;
      max-width:380px;
      background:#fff;
      padding:24px;
      border-radius:16px;
      box-shadow:0 12px 30px rgba(0,0,0,.08);
      border:1px solid var(--border);
    }

    .login-box h2{
      margin:0 0 18px;
      text-align:center;
      font-size:24px;
    }

    .topbar{
      background:#fff;
      border-bottom:1px solid var(--border);
      padding:16px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .topbar h1{
      margin:0;
      font-size:22px;
    }

    .topbar-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:18px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
    }

    .card h3{
      margin:0 0 14px;
      font-size:18px;
    }

    .full{
      grid-column:1 / -1;
    }

    label{
      display:block;
      margin-top:12px;
      margin-bottom:6px;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    input, textarea, select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      font-size:14px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    .btn{
      border:none;
      border-radius:10px;
      padding:12px 14px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .btn-success{
      background:var(--success);
      color:#fff;
    }

    .btn-secondary{
      background:var(--secondary);
      color:#fff;
    }

    .vehicle-list{
      display:grid;
      gap:10px;
      margin-top:14px;
      max-height:480px;
      overflow:auto;
    }

    .vehicle-item{
      border:1px solid var(--border);
      border-radius:12px;
      padding:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .vehicle-item strong{
      display:block;
    }

    .vehicle-item span{
      font-size:12px;
      color:var(--muted);
    }

    .slot-help{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    .status-box{
      margin-top:12px;
      padding:12px 14px;
      border-radius:10px;
      font-size:14px;
      font-weight:700;
      display:none;
    }

    .status-success{
      display:block;
      background:#ecfdf3;
      color:#166534;
      border:1px solid #bbf7d0;
    }

    .status-error{
      display:block;
      background:#fef2f2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body onload="initPage()">

  <div id="loginScreen" class="login-wrap">
    <div class="login-box">
      <h2>Admin Giriş</h2>

      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="Email">

      <label>Şifre</label>
      <input id="loginPassword" type="password" placeholder="Şifre">

      <button class="btn btn-primary" style="width:100%; margin-top:14px;" onclick="login()">
        Giriş Yap
      </button>

      <div id="loginStatus" class="status-box"></div>
    </div>
  </div>

  <div id="panelScreen" class="hidden">
    <div class="topbar">
      <h1>Yönetim Paneli</h1>
      <div class="topbar-actions">
        <button class="btn btn-secondary" onclick="openSite()">Siteyi Aç</button>
        <button class="btn btn-danger" onclick="logout()">Çıkış Yap</button>
      </div>
    </div>

    <div class="container">
      <div id="panelStatus" class="status-box"></div>

      <div class="grid">
        <div class="card">
          <h3>Site Ayarları</h3>

          <label>Site Başlığı</label>
          <input id="siteTitleInput" placeholder="Site başlığı">

          <label>Slogan</label>
          <input id="siteSloganInput" placeholder="Slogan">

          <label>VIP Başlık</label>
          <input id="vipTitleInput" placeholder="VIP İlanlar">

          <label>Normal Başlık</label>
          <input id="normalTitleInput" placeholder="Normal İlanlar ">

          <label>Detay Sayfa Başlığı</label>
          <input id="detailTitleInput" placeholder="İlan Detayı">

          <label>WhatsApp</label>
          <input id="siteWhatsappInput" placeholder="90555...">

          <label>Telegram</label>
          <input id="siteTelegramInput" placeholder="kullaniciadi">

          <label>Boş Kutu Yazısı</label>
          <input id="siteEmptyTextInput" placeholder="Yeni sahibini bekliyor">

          <button class="btn btn-primary" style="margin-top:14px; width:100%;" onclick="saveSiteSettings()">
            Site Ayarlarını Kaydet
          </button>
        </div>

        <div class="card">
          <h3>Araç Ekle / Düzenle</h3>

          <input type="hidden" id="editId">

          <label>Escort Adı</label>
          <input id="name" placeholder="Araç adı">

          <label>Kutu İç Yazısı</label>
          <input id="cardLabel" placeholder="Örn: Yeni / Özel / Güzeldir">

          <label>Fotoğraflar</label>
          <input id="imageFiles" type="file" accept="image/*" multiple>
          <div class="slot-help">Birden fazla foto seçebilirsin.</div>

          <label>Yüklenen / Eklenen Foto Linkleri</label>
          <textarea id="images" placeholder="Yüklenen fotoğraflar burada görünecek"></textarea>

          <label>Yaş</label>
          <input id="age" placeholder="19">

          <label>Boy</label>
          <input id="height" placeholder="1.70">

          <label>Kilo</label>
          <input id="weight" placeholder="55 kg">

          <label>Açıklama</label>
          <textarea id="description" placeholder="Açıklama"></textarea>

          <label>Telefon</label>
          <input id="phone" placeholder="Telefon numarası">

          <label>WhatsApp</label>
          <input id="whatsapp" placeholder="90555...">

          <label>Telegram</label>
          <input id="telegram" placeholder="kullaniciadi">

          <label>Kutu Türü</label>
          <select id="type" onchange="toggleSlotInputs()">
            <option value="vip">VIP</option>
            <option value="normal">Normal</option>
          </select>

          <div id="vipSlotWrap">
            <label>VIP Kutu Numarası</label>
            <input id="vipSlot" type="number" min="1" placeholder="Örn: 7">
          </div>

          <div id="normalSlotWrap" class="hidden">
            <label>Normal Kutu Numarası</label>
            <input id="normalSlot" type="number" min="1" placeholder="Örn: 34">
          </div>

          <button id="saveBtn" class="btn btn-success" style="margin-top:14px; width:100%;" onclick="saveCar()">
            Escort Kaydet
          </button>

          <button id="cancelEditBtn" class="btn btn-secondary hidden" style="margin-top:10px; width:100%;" onclick="cancelEdit()">
            Düzenlemeyi İptal Et
          </button>
        </div>

        <div class="card full">
          <h3>Escortları Yönet</h3>
          <div id="vehicleList" class="vehicle-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ynwybfequmttfqrloqtl.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_HmDxeh3imA0fEW8h6ygz-g_2zssLCfo";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showStatus(targetId, message, type = "success"){
      const box = document.getElementById(targetId);
      box.className = "status-box " + (type === "success" ? "status-success" : "status-error");
      box.textContent = message;
    }

    function clearStatus(targetId){
      const box = document.getElementById(targetId);
      box.className = "status-box";
      box.textContent = "";
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function initPage(){
      toggleSlotInputs();
      const { data: { session } } = await sb.auth.getSession();
      if(session){
        showPanel();
      } else {
        showLogin();
      }
    }

    function showLogin(){
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("panelScreen").classList.add("hidden");
    }

    async function showPanel(){
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("panelScreen").classList.remove("hidden");
      clearCarForm();
      await loadSiteSettings();
      await loadVehicleList();
    }

    async function login(){
      clearStatus("loginStatus");
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if(error){
        showStatus("loginStatus", "Giriş başarısız: " + error.message, "error");
        return;
      }

      await showPanel();
    }

    async function logout(){
      await sb.auth.signOut();
      showLogin();
    }

    function openSite(){
      window.open("index.html", "_blank");
    }

    function toggleSlotInputs(){
      const type = document.getElementById("type").value;
      document.getElementById("vipSlotWrap").classList.toggle("hidden", type !== "vip");
      document.getElementById("normalSlotWrap").classList.toggle("hidden", type !== "normal");
    }

    async function loadSiteSettings(){
      const { data, error } = await sb.from("settings").select("*").eq("id", 1).single();
      if(error){
        console.error(error);
        return;
      }

      document.getElementById("siteTitleInput").value = data.title || "";
      document.getElementById("siteSloganInput").value = data.slogan || "";
      document.getElementById("vipTitleInput").value = data.vip_title || "";
      document.getElementById("normalTitleInput").value = data.normal_title || "";
      document.getElementById("detailTitleInput").value = data.detail_title || "";
      document.getElementById("siteWhatsappInput").value = data.whatsapp || "";
      document.getElementById("siteTelegramInput").value = data.telegram || "";
      document.getElementById("siteEmptyTextInput").value = data.empty_text || "";
    }

    async function saveSiteSettings(){
      clearStatus("panelStatus");

      const payload = {
        title: document.getElementById("siteTitleInput").value.trim(),
        slogan: document.getElementById("siteSloganInput").value.trim(),
        vip_title: document.getElementById("vipTitleInput").value.trim(),
        normal_title: document.getElementById("normalTitleInput").value.trim(),
        detail_title: document.getElementById("detailTitleInput").value.trim(),
        whatsapp: document.getElementById("siteWhatsappInput").value.trim(),
        telegram: document.getElementById("siteTelegramInput").value.trim(),
        empty_text: document.getElementById("siteEmptyTextInput").value.trim()
      };

      const { error } = await sb.from("settings").update(payload).eq("id", 1);

      if(error){
        showStatus("panelStatus", "Site ayarları kaydedilemedi: " + error.message, "error");
        return;
      }

      showStatus("panelStatus", "Site ayarları kaydedildi", "success");
    }

    function clearCarForm(){
      document.getElementById("editId").value = "";
      document.getElementById("name").value = "";
      document.getElementById("cardLabel").value = "";
      document.getElementById("imageFiles").value = "";
      document.getElementById("images").value = "";
      document.getElementById("age").value = "";
      document.getElementById("height").value = "";
      document.getElementById("weight").value = "";
      document.getElementById("description").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("whatsapp").value = "";
      document.getElementById("telegram").value = "";
      document.getElementById("type").value = "vip";
      document.getElementById("vipSlot").value = "";
      document.getElementById("normalSlot").value = "";
      document.getElementById("saveBtn").textContent = "Araç Kaydet";
      document.getElementById("cancelEditBtn").classList.add("hidden");
      toggleSlotInputs();
    }

    function cancelEdit(){
      clearCarForm();
    }

    async function uploadImages(files){
      const uploadedUrls = [];

      for (const file of files) {
        const safeName = file.name.replaceAll(" ", "-");
        const fileName = `${Date.now()}-${safeName}`;
        const filePath = `cars/${fileName}`;

        const { error: uploadError } = await sb.storage
          .from("car-images")
          .upload(filePath, file, {
            cacheControl: "3600",
            upsert: true
          });

        if (uploadError) {
          console.error("Upload error:", uploadError);
          throw uploadError;
        }

        const { data } = sb.storage
          .from("car-images")
          .getPublicUrl(filePath);

        uploadedUrls.push(data.publicUrl);
      }

      return uploadedUrls;
    }

    async function loadVehicleList(){
      clearStatus("panelStatus");
      const list = document.getElementById("vehicleList");
      list.innerHTML = "Yükleniyor...";

      const { data, error } = await sb.from("cars").select("*").order("created_at", { ascending: false });

      if(error){
        list.innerHTML = "";
        showStatus("panelStatus", "Escortlar yüklenemedi: " + error.message, "error");
        return;
      }

      if(!data || data.length === 0){
        list.innerHTML = `
          <div class="vehicle-item">
            <div>
              <strong>Henüz escort eklenmedi</strong>
              <span>Liste boş</span>
            </div>
          </div>
        `;
        return;
      }

      list.innerHTML = "";

      const sorted = [...data].sort((a, b) => {
        if(a.type === b.type){
          const aSlot = a.type === "vip" ? (a.vip_slot || 99999) : (a.normal_slot || 99999);
          const bSlot = b.type === "vip" ? (b.vip_slot || 99999) : (b.normal_slot || 99999);
          return aSlot - bSlot;
        }
        return a.type === "vip" ? -1 : 1;
      });

      sorted.forEach(car => {
        const slotText = car.type === "vip"
          ? `VIP Kutu: ${car.vip_slot || "-"}`
          : `Normal Kutu: ${car.normal_slot || "-"}`;

        const item = document.createElement("div");
        item.className = "vehicle-item";
        item.innerHTML = `
          <div>
            <strong>${escapeHtml(car.name)}</strong>
            <span>${car.type === "vip" ? "VIP" : "Normal"} • ${slotText}</span>
          </div>
          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="editCar('${car.id}')">Düzenle</button>
            <button class="btn btn-danger" onclick="deleteCar('${car.id}')">Sil</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    async function saveCar(){
      clearStatus("panelStatus");

      const editId = document.getElementById("editId").value.trim();
      const type = document.getElementById("type").value;
      const vipSlotValue = parseInt(document.getElementById("vipSlot").value || "0", 10);
      const normalSlotValue = parseInt(document.getElementById("normalSlot").value || "0", 10);

      const imageInput = document.getElementById("imageFiles");
      const selectedFiles = Array.from(imageInput.files || []);

      let uploadedImages = [];
      if (selectedFiles.length > 0) {
        try {
          uploadedImages = await uploadImages(selectedFiles);
        } catch (error) {
          showStatus("panelStatus", "Fotoğraf yükleme hatası: " + error.message, "error");
          return;
        }
      }

      const manualImages = document.getElementById("images").value
        .split("\n")
        .map(x => x.trim())
        .filter(Boolean);

      const images = [...manualImages, ...uploadedImages];
      document.getElementById("images").value = images.join("\n");

      const payload = {
        name: document.getElementById("name").value.trim(),
        card_label: document.getElementById("cardLabel").value.trim() || null,
        images,
        age: document.getElementById("age").value.trim() || null,
        height: document.getElementById("height").value.trim() || null,
        weight: document.getElementById("weight").value.trim() || null,
        description: document.getElementById("description").value.trim() || null,
        phone: document.getElementById("phone").value.trim() || null,
        whatsapp: document.getElementById("whatsapp").value.trim() || null,
        telegram: document.getElementById("telegram").value.trim() || null,
        type,
        vip_slot: type === "vip" ? vipSlotValue : null,
        normal_slot: type === "normal" ? normalSlotValue : null,
        is_active: true
      };

      if(!payload.name){
        showStatus("panelStatus", "Escort adı gerekli", "error");
        return;
      }

      if(type === "vip" && (!vipSlotValue || vipSlotValue < 1)){
        showStatus("panelStatus", "VIP kutu numarası gerekli", "error");
        return;
      }

      if(type === "normal" && (!normalSlotValue || normalSlotValue < 1)){
        showStatus("panelStatus", "Normal kutu numarası gerekli", "error");
        return;
      }

      let result;
      if(editId){
        result = await sb.from("cars").update(payload).eq("id", editId);
      } else {
        result = await sb.from("cars").insert([payload]);
      }

      if(result.error){
        showStatus("panelStatus", "Kayıt hatası: " + result.error.message, "error");
        return;
      }

      showStatus("panelStatus", editId ? "Escort güncellendi" : "Escort eklendi", "success");
      clearCarForm();
      await loadVehicleList();
    }

    async function editCar(id){
      clearStatus("panelStatus");

      const { data, error } = await sb.from("cars").select("*").eq("id", id).single();

      if(error){
        showStatus("panelStatus", "Escort getirilemedi: " + error.message, "error");
        return;
      }

      document.getElementById("editId").value = data.id;
      document.getElementById("name").value = data.name || "";
      document.getElementById("cardLabel").value = data.card_label || "";
      document.getElementById("images").value = (data.images || []).join("\n");
      document.getElementById("age").value = data.age || "";
      document.getElementById("height").value = data.height || "";
      document.getElementById("weight").value = data.weight || "";
      document.getElementById("description").value = data.description || "";
      document.getElementById("phone").value = data.phone || "";
      document.getElementById("whatsapp").value = data.whatsapp || "";
      document.getElementById("telegram").value = data.telegram || "";
      document.getElementById("type").value = data.type || "vip";
      document.getElementById("vipSlot").value = data.vip_slot || "";
      document.getElementById("normalSlot").value = data.normal_slot || "";
      document.getElementById("saveBtn").textContent = "Escort Güncelle";
      document.getElementById("cancelEditBtn").classList.remove("hidden");

      toggleSlotInputs();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteCar(id){
      const ok = confirm("Bu escort'u silmek istiyor musun?");
      if(!ok) return;

      clearStatus("panelStatus");

      const { error } = await sb.from("cars").delete().eq("id", id);

      if(error){
        showStatus("panelStatus", "Silme hatası: " + error.message, "error");
        return;
      }

      showStatus("panelStatus", "Escort silindi", "success");
      await loadVehicleList();
    }
  </script>
</body>
</html>
